events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Re-resolve the backend hostname every 10s. Railway rotates private IPs
    # on every redeploy; without this, nginx caches the IP at boot and every
    # request after the next backend deploy hits a dead address (504).
    # NGINX_RESOLVER is read from /etc/resolv.conf at container startup
    # (see Dockerfile.frontend) because Railway's resolver address is not
    # a fixed value.
    resolver ${NGINX_RESOLVER} valid=10s ipv6=on;
    resolver_timeout 5s;

    server {
        listen ${PORT};
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript;

        client_max_body_size 20M;

        # Assigning the upstream URL to a variable forces nginx to use the
        # runtime resolver on each request instead of caching at config load.
        # $request_uri is passed explicitly because proxy_pass with a variable
        # does not preserve the original URI automatically.
        set $backend_url "${BACKEND_URL}";

        # ── API → Django backend ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         $backend_url$request_uri;
            proxy_set_header   Host              ${BACKEND_HOST};
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        location /admin/ {
            proxy_pass         $backend_url$request_uri;
            proxy_set_header   Host              ${BACKEND_HOST};
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── User-uploaded media (team logos, etc.) → Django backend ─────────
        location /media/ {
            proxy_pass         $backend_url$request_uri;
            proxy_set_header   Host              ${BACKEND_HOST};
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # React SPA — all routes fall back to index.html
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}

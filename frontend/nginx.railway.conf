events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging — includes upstream address and status to aid 502 debugging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr" '
                    'upstream_status="$upstream_status"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # DNS resolver — auto-detected from /etc/resolv.conf at container startup.
    # Must live in the http block so it applies to all upstreams.
    resolver ${DNS_RESOLVER} valid=30s;

    server {
        listen ${PORT};
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript;

        client_max_body_size 20M;

        # ── API → Django backend ─────────────────────────────────────────────
        # Using a variable forces nginx to resolve the hostname at request time
        # rather than at startup, so the container starts even if the backend
        # isn't ready yet.
        set $backend ${BACKEND_URL};

        location /api/ {
            proxy_pass         $backend;
            proxy_set_header   Host              ${BACKEND_HOST};
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_next_upstream   error timeout http_502 http_503 http_504;
        }

        location /admin/ {
            proxy_pass         $backend;
            proxy_set_header   Host              ${BACKEND_HOST};
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # React SPA — all routes fall back to index.html
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}

# Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml down
#
# The database is managed externally (Railway, Render, etc.).
# All secrets come from environment variables — never hardcode them here.
# Copy .env.example to .env.prod and fill in real values before deploying.

services:
  # ── Django API (Gunicorn) ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: flowpath_api
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── React Frontend + Nginx ──────────────────────────────────────────────────
  # Serves the built static files and proxies /api/ + /admin/ to the api service.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # /api is same-origin — nginx proxies it to the api service internally
        VITE_API_URL: /api
    container_name: flowpath_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

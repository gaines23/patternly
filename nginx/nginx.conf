events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    upstream django_api {
        server api:8000;
    }

    upstream vite_frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # ── AI generation (slow — Claude can take 60-120s) ────────────────
        location /api/v1/workflows/generate/ {
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            proxy_connect_timeout 60s;
            proxy_read_timeout    180s;
        }

        # ── Agent Compiler (generates multiple suggestions — can take 120s+) ─
        location /api/v1/workflows/compile/ {
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            proxy_connect_timeout 60s;
            proxy_read_timeout    180s;
        }

        # ── Ingestion (transcript fetch + AI extraction can take 60-120s) ─
        location /api/v1/briefs/ingest/ {
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            proxy_connect_timeout 60s;
            proxy_read_timeout    180s;
        }

        # ── API routes → Django ────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }

        # ── Django Admin ───────────────────────────────────────────────────
        location /admin/ {
            proxy_pass         http://django_api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Django static files ────────────────────────────────────────────
        location /static/ {
            proxy_pass http://django_api;
        }

        # ── Vite HMR WebSocket (hot reload) ───────────────────────────────
        location /ws/ {
            proxy_pass          http://vite_frontend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
        }

        # ── Everything else → Vite frontend ───────────────────────────────
        location / {
            proxy_pass         http://vite_frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # WebSocket support for Vite HMR
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}

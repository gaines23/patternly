version: "3.9"

services:
  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: flowpath_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowpath}
      POSTGRES_USER: ${POSTGRES_USER:-flowpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowpath_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowpath} -d ${POSTGRES_DB:-flowpath}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowpath_api
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgres://${POSTGRES_USER:-flowpath}:${POSTGRES_PASSWORD:-flowpath_dev_password}@db:5432/${POSTGRES_DB:-flowpath}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,api"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── React Frontend (Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowpath_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: flowpath_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
